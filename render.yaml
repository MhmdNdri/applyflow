services:
  - type: web
    name: applyflow-api-staging
    env: docker
    dockerfilePath: ./Dockerfile.api
    autoDeploy: true
    plan: starter
    healthCheckPath: /api/v1/health
    envVars:
      - key: APP_ENV
        value: staging
      - key: API_HOST
        value: 0.0.0.0
      - key: API_PREFIX
        value: /api/v1
      - key: API_TITLE
        value: Applyflow API
      - key: API_VERSION
        value: 0.1.0
      - key: LOG_LEVEL
        value: INFO
      - key: AUTH_ENABLED
        value: "true"
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CLERK_ISSUER
        sync: false
      - key: CLERK_JWKS_URL
        sync: false
      - key: CLERK_AUDIENCE
        sync: false
      - key: CLERK_AUTHORIZED_PARTY
        sync: false
      - key: FRONTEND_BASE_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false

  - type: worker
    name: applyflow-worker-staging
    env: docker
    dockerfilePath: ./Dockerfile.worker
    autoDeploy: true
    plan: starter
    envVars:
      - key: APP_ENV
        value: staging
      - key: LOG_LEVEL
        value: INFO
      - key: AUTH_ENABLED
        value: "true"
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CLERK_ISSUER
        sync: false
      - key: CLERK_JWKS_URL
        sync: false
